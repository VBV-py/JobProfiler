ai_usage_summary: |
  Used Claude for code review, architectural discussion, and initial
  scaffolding. All scoring logic, weight tuning, and honeypot detection
  rules were designed and iterated by the team. No candidate data was
  fed to any external LLM.

# Approach summary
methodology_summary: |
  Multi-component rule-based ranking system with behavioral signal modifiers.
  Six scoring dimensions (title relevance, skill match with endorsement-based
  trust weighting, career trajectory analysis, experience fit, location, and
  education) combined via weighted composite. The skill matcher applies a
  trust multiplier using endorsement counts and skill duration to catch keyword
  stuffers. Career trajectory analysis detects consulting-only careers and
  rewards production ML experience at product companies. An 8-check honeypot
  detector catches impossible profiles. Behavioral engagement signals
  (response rate, recency, notice period) act as a multiplicative modifier.
  Runtime is ~2 minutes for 100K candidates on CPU.

